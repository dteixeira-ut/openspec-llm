name: Spec Drift Monitor

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  spec-drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for spec files
        id: check-specs
        run: |
          if [ -d "openspec/specs" ] && [ "$(ls -A openspec/specs 2>/dev/null)" ]; then
            echo "has_specs=true" >> $GITHUB_OUTPUT
          else
            echo "has_specs=false" >> $GITHUB_OUTPUT
            echo "No spec files found in openspec/specs/ — skipping drift check."
          fi

      - name: Gather specs and diff
        if: steps.check-specs.outputs.has_specs == 'true'
        id: gather
        run: |
          SPECS=$(find openspec/specs -name "spec.md" -exec sh -c 'echo "=== $1 ==="; cat "$1"' _ {} \; 2>/dev/null)

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF=$(git diff origin/${{ github.base_ref }}...HEAD \
              -- . ':(exclude)openspec/' ':(exclude)*.lock' ':(exclude)*.json' \
              2>/dev/null | head -c 12000)
          else
            DIFF=$(git diff HEAD~1 HEAD \
              -- . ':(exclude)openspec/' ':(exclude)*.lock' ':(exclude)*.json' \
              2>/dev/null | head -c 12000)
          fi

          printf '%s' "$SPECS" > /tmp/specs.txt
          printf '%s' "$DIFF" > /tmp/diff.txt

      - name: Analyze drift via GitHub Models
        if: steps.check-specs.outputs.has_specs == 'true'
        id: analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "You are a spec drift analyzer. Your job is to detect when code changes contradict or miss spec requirements."
            echo ""
            echo "RULES — follow exactly:"
            echo "1. Output ONLY the markdown table and one summary line. No prose, no narrative, no extra sections."
            echo "2. OMIT rows where status is UNRELATED — do not list them at all."
            echo "3. If every capability is UNRELATED, output only: 'No spec drift detected — changes do not touch any specified capabilities.'"
            echo "4. Notes must be 8 words or fewer."
            echo "5. Do not repeat capability names in the notes."
            echo ""
            echo "OUTPUT FORMAT (nothing before or after this):"
            echo "| Capability | Status | Notes |"
            echo "|-----------|--------|-------|"
            echo "| <name> | ALIGNED or DRIFTED or MISSING | <8 words max> |"
            echo ""
            echo "**Summary:** <one sentence, max 20 words>"
            echo ""
            echo "STATUS DEFINITIONS:"
            echo "- ALIGNED: change implements or is consistent with this spec requirement"
            echo "- DRIFTED: change contradicts or diverges from this spec requirement"
            echo "- MISSING: spec requires something with no corresponding code in the diff"
            echo "- UNRELATED: diff does not touch this capability (OMIT from output)"
            echo ""
            echo "SPECS:"
            cat /tmp/specs.txt
            echo ""
            echo "CODE DIFF:"
            cat /tmp/diff.txt
          } > /tmp/prompt.txt

          PAYLOAD=$(jq -n \
            --arg model "gpt-4o-mini" \
            --rawfile prompt /tmp/prompt.txt \
            '{model: $model, messages: [{role: "user", content: $prompt}], max_tokens: 800}')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | jq -e '.choices[0].message.content' > /dev/null 2>&1; then
            echo "$BODY" | jq -r '.choices[0].message.content' > /tmp/report.txt
            echo "report_available=true" >> $GITHUB_OUTPUT
          else
            echo "report_available=false" >> $GITHUB_OUTPUT
            echo "GitHub Models API returned HTTP $HTTP_CODE — Copilot access may be required." >&2
          fi

      - name: Post drift report as PR comment
        if: >
          github.event_name == 'pull_request' &&
          steps.check-specs.outputs.has_specs == 'true' &&
          steps.analyze.outputs.report_available == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "<!-- spec-drift-monitor -->"
            cat /tmp/report.txt
            echo ""
            echo "---"
            echo "> Informational only — this check never blocks merges. Analysis powered by [GitHub Models](https://github.com/marketplace/models)."
          } > /tmp/comment.txt

          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/comment.txt \
            --repo ${{ github.repository }}
